<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
--bg-primary:    #0f1117;
--bg-secondary:  #1a1d2e;
--bg-header:     #13162a;
--border-color:  #2d3148;
--text-primary:  #e2e8f0;
--text-secondary:#a8b2c1;
--accent-red:    #a78bfa;
--accent-orange: #fb8500;
--accent-green:  #26d07c;
--accent-blue:   #58a6ff;
--accent-cyan:   #79c0ff;
--accent-purple: #d291ff;
}
body {
background-color: var(--bg-primary);
background-image:
radial-gradient(circle at 15% 15%, rgba(167,139,250,.50) 0%, transparent 40%),
radial-gradient(circle at 85% 80%, rgba(96,165,250,.45) 0%, transparent 40%),
radial-gradient(circle at 78%  8%, rgba(13,148,136,.42) 0%, transparent 30%),
radial-gradient(circle at  4% 88%, rgba(255,224,51,.35) 0%, transparent 30%),
radial-gradient(circle at 50% 50%, rgba(210,145,255,.18) 0%, transparent 60%),
radial-gradient(circle, rgba(167,139,250,.22) 1px, transparent 1px);
background-size: auto,auto,auto,auto,auto,28px 28px;
color: var(--text-primary);
font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
padding: 24px;
line-height: 1.6;
}
